<div class="content-card">

    <div class="content-card-header">
        Circulars & Memos
    </div>

    <div class="circulars-body">

        <table class="table table-hover border-0">

            <tbody>

                @for(item of circulars; track item.title) {

                    <tr>

                        <td class="news-column">
                            {{ item.description }}
                        </td>

                        <td class="title-column">
                            {{ item.title }}
                        </td>

                        <td class="pdf-column">

                            <a
                                [href]="item.filePath"
                                target="_blank">

                                <img
                                    src="/images/icon-pdf.png"
                                    alt="PDF"
                                    width="30">

                            </a>

                        </td>

                    </tr>

                }

            </tbody>

        </table>

    </div>

</div>
